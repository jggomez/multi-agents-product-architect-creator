steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/orchestrator:${_TAG}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/orchestrator:latest'
      - '.'
    dir: 'agents/orchestrator'

  # Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/orchestrator'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'orchestrator'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/orchestrator:${_TAG}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--cpu'
      - '1'
      - '--memory'
      - '512Mi'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'GOOGLE_CLOUD_PROJECT=${PROJECT_ID},GOOGLE_CLOUD_LOCATION=${_LOCATION},GOOGLE_GENAI_USE_VERTEXAI=True,LOGS_BUCKET_NAME=${_LOGS_BUCKET},ANALYST_URL=${_ANALYST_URL},ARCHITECT_URL=${_ARCHITECT_URL},UX_DESIGNER_URL=${_UX_DESIGNER_URL},CRITIC_URL=${_CRITIC_URL},MODEL_ARMOR_PROJECT_ID=${PROJECT_ID},MODEL_ARMOR_LOCATION=${_MODEL_ARMOR_LOCATION},MODEL_ARMOR_TEMPLATE_ID=${_MODEL_ARMOR_TEMPLATE_ID}'
      - '--port'
      - '8080'

substitutions:
  _REGION: us-central1
  _LOCATION: global
  _REPO_NAME: agent-ux
  _LOGS_BUCKET: docs-agents-software
  _TAG: latest
  # Sub-agent Cloud Run URLs - UPDATE AFTER DEPLOYING SUB-AGENTS
  _ANALYST_URL: 'https://analyst-XXXXXXXXXX-uc.a.run.app'
  _ARCHITECT_URL: 'https://architect-XXXXXXXXXX-uc.a.run.app'
  _UX_DESIGNER_URL: 'https://ux-designer-XXXXXXXXXX-uc.a.run.app'
  _CRITIC_URL: 'https://critic-XXXXXXXXXX-uc.a.run.app'
  # Model Armor config
  _MODEL_ARMOR_LOCATION: us-central1
  _MODEL_ARMOR_TEMPLATE_ID: multi-agents-product-security

options:
  logging: CLOUD_LOGGING_ONLY
